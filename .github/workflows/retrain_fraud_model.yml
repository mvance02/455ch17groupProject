name: Nightly Fraud Model Retrain

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary scikit-learn pandas joblib

      - name: Retrain fraud model
        run: python jobs/train_fraud_lr.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-artifacts
          path: artifacts/

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          git diff --staged --quiet || git commit -m "chore: nightly fraud model retrain [skip ci]"
          git push
